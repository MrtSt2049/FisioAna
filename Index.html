<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroFisio UNIFESP — Simulado Sistema Nervoso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2236;
    --card: #141c2e;
    --border: rgba(100,180,255,0.12);
    --border2: rgba(100,180,255,0.25);
    --text: #e8edf5;
    --text2: #94a8c4;
    --text3: #5a7190;
    --accent: #4a9eff;
    --accent2: #7bb8ff;
    --gold: #f0b429;
    --gold2: #ffd166;
    --green: #34d399;
    --red: #f87171;
    --purple: #a78bfa;
    --teal: #2dd4bf;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(100,180,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(100,180,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 45%, rgba(100,180,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(100,180,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 70%, rgba(100,180,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 0.5px solid var(--border2);
    background: linear-gradient(180deg, rgba(10,15,30,0) 0%, rgba(10,15,30,0.8) 100%);
  }

  .header-badge {
    display: inline-block;
    background: rgba(74,158,255,0.1);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--text2);
    font-size: 1rem;
    font-weight: 300;
    margin-bottom: 1.5rem;
  }

  .stats-row {
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .stat-pill {
    background: rgba(74,158,255,0.08);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--text2);
  }

  .stat-pill strong {
    color: var(--accent2);
    font-weight: 600;
  }

  /* Dashboard */
  #dashboard {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,15,30,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .dash-item {
    font-size: 13px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dash-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dash-dot.correct { background: var(--green); }
  .dash-dot.wrong { background: var(--red); }
  .dash-dot.pending { background: var(--text3); }

  #score-display {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold2);
    margin-left: auto;
  }

  /* Progress bar */
  #progress-bar-wrap {
    height: 2px;
    background: var(--bg3);
    position: sticky;
    top: 48px;
    z-index: 99;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* Filters */
  .filters {
    position: relative;
    z-index: 10;
    padding: 1.5rem 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .filter-btn {
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(74,158,255,0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Main content */
  main {
    position: relative;
    z-index: 10;
    max-width: 860px;
    margin: 0 auto;
    padding: 1rem 2rem 4rem;
  }

  /* Category header */
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 0.5px solid var(--border);
  }

  .category-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
  }

  .category-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .q-card:hover {
    border-color: var(--border2);
  }

  .q-card.answered-correct {
    border-color: rgba(52,211,153,0.3);
  }

  .q-card.answered-wrong {
    border-color: rgba(248,113,113,0.3);
  }

  .q-header {
    padding: 1rem 1.25rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    user-select: none;
  }

  .q-number {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-top: 3px;
    min-width: 28px;
  }

  .q-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    flex: 1;
  }

  .q-status {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    border: 1.5px solid var(--border2);
    transition: all 0.3s;
  }

  .q-card.answered-correct .q-status {
    background: var(--green);
    border-color: var(--green);
  }

  .q-card.answered-wrong .q-status {
    background: var(--red);
    border-color: var(--red);
  }

  /* Options */
  .q-options {
    padding: 0 1.25rem 1.25rem 3.5rem;
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  .q-card.open .q-options {
    display: flex;
  }

  .q-card.open .q-header {
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 0.75rem;
  }

  .opt-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: left;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }

  .opt-btn:hover:not(:disabled) {
    background: rgba(74,158,255,0.08);
    border-color: var(--accent);
    color: var(--text);
  }

  .opt-btn:disabled { cursor: default; }

  .opt-btn.selected-correct {
    background: rgba(52,211,153,0.1);
    border-color: rgba(52,211,153,0.5);
    color: var(--green);
  }

  .opt-btn.selected-wrong {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.5);
    color: var(--red);
  }

  .opt-btn.reveal-correct {
    background: rgba(52,211,153,0.06);
    border-color: rgba(52,211,153,0.3);
    color: rgba(52,211,153,0.7);
  }

  .opt-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text3);
    flex-shrink: 0;
    margin-top: 1px;
    min-width: 18px;
  }

  .opt-btn.selected-correct .opt-label { color: var(--green); }
  .opt-btn.selected-wrong .opt-label { color: var(--red); }
  .opt-btn.reveal-correct .opt-label { color: rgba(52,211,153,0.7); }

  /* Explanation */
  .explanation {
    margin-top: 10px;
    padding: 12px 14px;
    background: rgba(74,158,255,0.05);
    border: 0.5px solid rgba(74,158,255,0.15);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    display: none;
  }

  .q-card.answered .explanation {
    display: block;
  }

  .explanation strong {
    color: var(--accent2);
    font-weight: 600;
  }

  /* Results panel */
  #results-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,8,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  #results-panel.show { display: flex; }

  .results-box {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 460px;
    width: 90%;
    text-align: center;
  }

  .results-score {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--gold2);
    line-height: 1;
    margin: 0.5rem 0;
  }

  .results-label {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .results-breakdown {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin: 1.5rem 0;
  }

  .rb-item {
    text-align: center;
  }

  .rb-num {
    font-size: 1.8rem;
    font-weight: 600;
    font-family: 'Playfair Display', serif;
  }

  .rb-num.g { color: var(--green); }
  .rb-num.r { color: var(--red); }

  .rb-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grade-msg {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .restart-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .restart-btn:hover { opacity: 0.85; }

  /* Finish button */
  #finish-btn {
    display: block;
    margin: 2rem auto;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 48px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    letter-spacing: 0.5px;
  }

  #finish-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  .chevron {
    margin-left: auto;
    color: var(--text3);
    font-size: 14px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .q-card.open .chevron { transform: rotate(180deg); }

  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding: 0.5rem 1rem 3rem; }
    .filters { padding: 1rem; }
    #dashboard { padding: 0.5rem 1rem; gap: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-badge">UNIFESP · Fisioterapia</div>
  <h1>Neuro<span>Fisio</span></h1>
  <p class="subtitle">Simulado — Módulo Sistema Nervoso · Dos Tecidos aos Sistemas</p>
  <div class="stats-row">
    <div class="stat-pill"><strong>100</strong> questões</div>
    <div class="stat-pill"><strong>7</strong> tópicos</div>
    <div class="stat-pill">Nível <strong>universitário</strong></div>
    <div class="stat-pill">Baseado em <strong>Netter</strong></div>
  </div>
</header>

<div id="dashboard">
  <div class="dash-item"><span class="dash-dot correct"></span><span id="cnt-correct">0</span> corretas</div>
  <div class="dash-item"><span class="dash-dot wrong"></span><span id="cnt-wrong">0</span> erradas</div>
  <div class="dash-item"><span class="dash-dot pending"></span><span id="cnt-pending">100</span> pendentes</div>
  <div id="score-display">0%</div>
</div>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div class="filters">
  <button class="filter-btn active" onclick="filterCategory('all', this)">Todas</button>
  <button class="filter-btn" onclick="filterCategory('somatica', this)">Sensib. Somática</button>
  <button class="filter-btn" onclick="filterCategory('especial', this)">Sensib. Especial</button>
  <button class="filter-btn" onclick="filterCategory('emocoes', this)">Emoções</button>
  <button class="filter-btn" onclick="filterCategory('movimento', this)">Controle Motor</button>
  <button class="filter-btn" onclick="filterCategory('cognitivo', this)">Funções Cognitivas</button>
  <button class="filter-btn" onclick="filterCategory('superiores', this)">Funções Superiores</button>
  <button class="filter-btn" onclick="filterCategory('fala', this)">Fala</button>
</div>

<main id="main-content"></main>

<button id="finish-btn" onclick="showResults()">Finalizar Simulado</button>

<div id="results-panel">
  <div class="results-box">
    <div style="font-size:13px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:0.5rem">Resultado Final</div>
    <div class="results-score" id="final-pct">0%</div>
    <div class="results-label">de aproveitamento</div>
    <div class="results-breakdown">
      <div class="rb-item"><div class="rb-num g" id="final-c">0</div><div class="rb-label">Corretas</div></div>
      <div style="width:1px;background:var(--border)"></div>
      <div class="rb-item"><div class="rb-num r" id="final-w">0</div><div class="rb-label">Erradas</div></div>
      <div style="width:1px;background:var(--border)"></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--text2)" id="final-p">0</div><div class="rb-label">Puladas</div></div>
    </div>
    <div class="grade-msg" id="grade-msg"></div>
    <button class="restart-btn" onclick="restart()">Reiniciar Simulado</button>
  </div>
</div>

<script>
const categories = [
  {
    id: 'somatica',
    title: 'Sensibilidade Somática',
    icon: '◎',
    iconBg: 'rgba(74,158,255,0.15)',
    color: '#4a9eff',
    questions: [
      {
        q: "Qual receptor cutâneo é responsável pela detecção de pressão sustentada e distorção da pele, sendo de adaptação lenta do tipo II?",
        opts: ["Corpúsculo de Meissner","Disco de Merkel","Corpúsculo de Pacini","Terminação de Ruffini"],
        correct: 3,
        exp: "<strong>Terminações de Ruffini</strong> são mecanorreceptores de adaptação lenta tipo II (RA II), localizados na derme profunda, sensíveis à tração e distorção sustentada da pele. Detectam estiramento cutâneo e contribuem para a propriocepção da posição dos dedos."
      },
      {
        q: "A via espinotalâmica lateral conduz principalmente qual modalidade sensorial?",
        opts: ["Propriocepção consciente e discriminação tátil fina","Dor e temperatura","Vibração e tato discriminativo","Pressão profunda inconsciente"],
        correct: 1,
        exp: "<strong>A via espinotalâmica lateral</strong> (anterolateral) transmite dor e temperatura. Os neurônios de 1ª ordem entram pelo corno dorsal, fazem sinapse no corno posterior, cruzam na comissura branca anterior e sobem pelo funículo anterolateral contralateral até o tálamo (núcleo VPL)."
      },
      {
        q: "Em qual coluna da medula espinal trafegam os axônios da via lemniscal medial antes de fazer sinapse nos núcleos grácil e cuneiforme?",
        opts: ["Funículo anterior","Funículo lateral","Funículo posterior (coluna dorsal)","Funículo anterolateral"],
        correct: 2,
        exp: "<strong>O funículo posterior</strong> (colunas dorsais) contém os axônios de 1ª ordem da via lemniscal. As fibras dos membros inferiores formam o fascículo grácil (coluna de Goll) e as dos superiores, o fascículo cuneiforme (coluna de Burdach). Fazem sinapse nos núcleos homônimos do bulbo."
      },
      {
        q: "O Corpúsculo de Meissner é classificado como qual tipo de receptor quanto à adaptação, e qual sua função primária?",
        opts: ["Adaptação lenta tipo I; pressão sustentada","Adaptação rápida; detecção de velocidade e textura fina","Adaptação rápida; vibração de alta frequência (200–300 Hz)","Adaptação lenta tipo II; distorção cutânea"],
        correct: 1,
        exp: "<strong>O Corpúsculo de Meissner</strong> é de adaptação rápida (RA I), localizado nas papilas dérmicas da pele glabra. Detecta movimento suave sobre a pele, velocidade e textura fina, sendo essencial para a manipulação de objetos. Responde especialmente a frequências de 2–40 Hz."
      },
      {
        q: "Qual núcleo talâmico recebe as informações de sensibilidade somática geral (tato, propriocepção, dor, temperatura) antes de projetá-las ao córtex somatossensorial primário?",
        opts: ["Núcleo ventral anterior (VA)","Núcleo centromediano","Núcleo ventral póstero-lateral (VPL)","Núcleo pulvinar"],
        correct: 2,
        exp: "<strong>O núcleo VPL (ventral póstero-lateral)</strong> do tálamo recebe aferências do lemnisco medial e do trato espinotalâmico, representando o corpo contralateral (exceto face, que vai ao VPM). Projeta somatotopicamente para o giro pós-central (áreas 3a, 3b, 1, 2 de Brodmann)."
      },
      {
        q: "A dor referida tem base neuroanatômica explicada pelo conceito de:",
        opts: ["Plasticidade sináptica homosynáptica","Convergência viscerossomática no corno posterior da medula","Inibição recíproca de interneurônios inibitórios","Potenciação de longa duração no córtex cingulado"],
        correct: 1,
        exp: "<strong>A convergência viscerossomática</strong> explica a dor referida: neurônios viscerais e somáticos fazem sinapse no mesmo neurônio de 2ª ordem no corno posterior. O SNC interpreta erroneamente o sinal como originado na região somática. Ex.: dor cardíaca referida ao braço esquerdo (dermátomos C8–T5)."
      },
      {
        q: "Qual é o principal neurotransmissor excitatório liberado pelos neurônios aferentes primários de dor (fibras Aδ e C) no corno posterior da medula?",
        opts: ["GABA e glicina","Dopamina e serotonina","Glutamato e substância P","Acetilcolina e noradrenalina"],
        correct: 2,
        exp: "<strong>Glutamato</strong> (age em receptores AMPA/NMDA) e <strong>substância P</strong> (neuropeptídeo que age em receptores NK1) são os principais transmissores excitatórios das fibras nociceptivas. A substância P amplifica e prolonga o sinal doloroso, contribuindo para a sensibilização central."
      },
      {
        q: "A teoria do controle de portão (gate control theory) de Melzack e Wall propõe que a ativação de quais fibras fecha o portão para a dor?",
        opts: ["Fibras C e Aδ","Fibras Aβ de grande diâmetro","Fibras autonômicas pré-ganglionares","Fibras eferentes gama"],
        correct: 1,
        exp: "<strong>A ativação de fibras Aβ</strong> (tato, pressão, vibração) estimula interneurônios inibitórios (células SG – substância gelatinosa) no corno posterior, que inibem a transmissão das fibras nociceptivas Aδ e C. Essa é a base neurofisiológica da TENS e da massagem para analgesia."
      },
      {
        q: "A hiperalgesia primária que ocorre após lesão tecidual periférica é causada principalmente por:",
        opts: ["Sensibilização central no tálamo","Sensibilização periférica dos nociceptores por mediadores inflamatórios (prostaglandinas, bradicinina, histamina)","Perda de interneurônios inibitórios medulares","Ativação de receptores NMDA medulares"],
        correct: 1,

// State
let state = {
  answers: {},
  openCard: null
};

function init() {
  const main = document.getElementById('main-content');
  let html = '';
  let qNum = 0;

  categories.forEach(cat => {
    html += `
      <div class="category-header" data-cat="${cat.id}">
        <div class="category-icon" style="background:${cat.iconBg};color:${cat.color}">${cat.icon}</div>
        <div class="category-title">${cat.title}</div>
        <div class="category-count">${cat.questions.length} questões</div>
      </div>`;

    cat.questions.forEach((q, qi) => {
      qNum++;
      const qid = `${cat.id}_${qi}`;
      html += `
        <div class="q-card" id="card_${qid}" data-cat="${cat.id}" data-qid="${qid}">
          <div class="q-header" onclick="toggleCard('${qid}')">
            <div class="q-number">Q${String(qNum).padStart(2,'0')}</div>
            <div class="q-text">${q.q}</div>
            <div class="q-status" id="status_${qid}"></div>
            <div class="chevron">▼</div>
          </div>
          <div class="q-options" id="opts_${qid}">
            ${q.opts.map((opt, oi) => `
              <button class="opt-btn" id="opt_${qid}_${oi}" onclick="selectAnswer('${qid}', ${oi})" data-qid="${qid}" data-oi="${oi}">
                <span class="opt-label">${String.fromCharCode(65+oi)}</span>
                <span>${opt}</span>
              </button>`).join('')}
            <div class="explanation" id="exp_${qid}">${q.exp}</div>
          </div>
        </div>`;
    });
  });

  main.innerHTML = html;
  updateDashboard();
}

function getQuestion(qid) {
  const [catId, qi] = qid.split('_');
  const cat = categories.find(c => c.id === catId);
  return cat ? cat.questions[parseInt(qi)] : null;
}

function toggleCard(qid) {
  const card = document.getElementById(`card_${qid}`);
  if (state.openCard && state.openCard !== qid) {
    document.getElementById(`card_${state.openCard}`).classList.remove('open');
  }
  if (state.openCard === qid) {
    card.classList.remove('open');
    state.openCard = null;
  } else {
    card.classList.add('open');
    state.openCard = qid;
  }
}

function selectAnswer(qid, oi) {
  if (state.answers[qid] !== undefined) return;

  const q = getQuestion(qid);
  if (!q) return;

  state.answers[qid] = oi;
  const correct = q.correct;
  const card = document.getElementById(`card_${qid}`);

  // Disable all options
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById(`opt_${qid}_${i}`);
    btn.disabled = true;
    if (i === oi && oi === correct) btn.classList.add('selected-correct');
    else if (i === oi && oi !== correct) btn.classList.add('selected-wrong');
    else if (i === correct) btn.classList.add('reveal-correct');
  }

  card.classList.add('answered');
  if (oi === correct) card.classList.add('answered-correct');
  else card.classList.add('answered-wrong');

  updateDashboard();
}

function updateDashboard() {
  const total = getAllQids().length;
  const answered = Object.keys(state.answers).length;
  let correct = 0, wrong = 0;

  getAllQids().forEach(qid => {
    if (state.answers[qid] !== undefined) {
      const q = getQuestion(qid);
      if (q && state.answers[qid] === q.correct) correct++;
      else if (state.answers[qid] !== undefined) wrong++;
    }
  });

  document.getElementById('cnt-correct').textContent = correct;
  document.getElementById('cnt-wrong').textContent = wrong;
  document.getElementById('cnt-pending').textContent = total - answered;

  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('score-display').textContent = answered > 0 ? `${pct}% (${answered}/${total} respondidas)` : `0/${total} respondidas`;
  document.getElementById('progress-bar').style.width = ((answered / total) * 100) + '%';
}

function getAllQids() {
  const ids = [];
  categories.forEach(cat => {
    cat.questions.forEach((q, qi) => ids.push(`${cat.id}_${qi}`));
  });
  return ids;
}

function filterCategory(catId, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.q-card').forEach(card => {
    card.style.display = (catId === 'all' || card.dataset.cat === catId) ? 'block' : 'none';
  });

  document.querySelectorAll('.category-header').forEach(h => {
    h.style.display = (catId === 'all' || h.dataset.cat === catId) ? 'flex' : 'none';
  });
}

function showResults() {
  const total = getAllQids().length;
  let correct = 0, wrong = 0, pending = 0;

  getAllQids().forEach(qid => {
    if (state.answers[qid] === undefined) {
      pending++;
    } else {
      const q = getQuestion(qid);
      if (q && state.answers[qid] === q.correct) correct++;
      else wrong++;
    }
  });

  const answered = correct + wrong;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;

  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('final-c').textContent = correct;
  document.getElementById('final-w').textContent = wrong;
  document.getElementById('final-p').textContent = pending;

  let msg = '';
  if (pct >= 90) msg = 'Excelente! Desempenho muito acima da média. Domínio sólido do módulo de sistema nervoso.';
  else if (pct >= 70) msg = 'Bom resultado! Demonstra compreensão consistente. Revise os tópicos errados para consolidar.';
  else if (pct >= 50) msg = 'Resultado moderado. Recomenda-se revisão intensiva do Netter e das aulas do módulo.';
  else msg = 'É necessário revisar o módulo com atenção. Consulte o Netter de Neurociência e os materiais da UNIFESP.';

  document.getElementById('grade-msg').textContent = msg;
  document.getElementById('results-panel').classList.add('show');
}

function restart() {
  state = { answers: {}, openCard: null };
  document.getElementById('results-panel').classList.remove('show');
  document.querySelectorAll('.q-card').forEach(card => {
    card.classList.remove('open','answered','answered-correct','answered-wrong');
  });
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = false;
    btn.classList.remove('selected-correct','selected-wrong','reveal-correct');
  });
  document.querySelectorAll('.explanation').forEach(e => e.style.display = '');
  updateDashboard();
}

init();
</script>
